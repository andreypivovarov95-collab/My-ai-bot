<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Ассистент</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body { 
            background-color: #0f0f13; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .pill { 
            background-color: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .input-box { background-color: #1e1e24; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* Стили для сообщений в чате */
        .msg-user { background-color: #b185ff; color: white; border-radius: 20px 20px 4px 20px; align-self: flex-end; }
        .msg-bot { background-color: #1e1e24; color: #e2e8f0; border-radius: 20px 20px 20px 4px; align-self: flex-start; border: 1px solid #2d2d35; }
        
        /* Анимация загрузки */
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="px-4 pt-4 pb-2">
    
    <div class="flex justify-between items-center mb-4 pt-2 flex-shrink-0">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-sparkles text-[#b185ff] text-xl"></i>
            <span class="font-semibold text-lg tracking-wide">AI Ассистент</span>
        </div>
        <div class="bg-[#23232a] px-3 py-1.5 rounded-full text-xs flex items-center gap-2 border border-gray-800">
            <div class="w-1.5 h-1.5 rounded-full bg-purple-500"></div>
            <span class="text-gray-300 font-medium">Gemma 3 27B</span>
        </div>
        <i class="fa-solid fa-ellipsis-vertical text-gray-400 text-lg px-2"></i>
    </div>

    <div id="welcome-screen" class="flex-1 flex flex-col items-center justify-center text-center overflow-y-auto pb-4 transition-all duration-300">
        <i class="fa-solid fa-sparkles text-5xl mb-6" style="color: #b185ff; filter: drop-shadow(0 0 20px rgba(177, 133, 255, 0.4));"></i>
        <h1 class="text-2xl font-bold mb-3">Привет, Андрей! Чем помочь?</h1>
        <p class="text-gray-400 text-sm mb-8 leading-relaxed">Встроенный чат на базе Gemma 3</p>
        
        <div class="flex flex-col gap-3 w-full max-w-sm px-2">
            <button onclick="sendMessage('Объясни квантовые вычисления простыми словами')" class="pill rounded-full py-3.5 px-4 text-sm text-gray-300 hover:bg-white/10 active:scale-95 text-center">Объясни квантовые вычисления</button>
            <button onclick="sendMessage('Напиши план тренировок на неделю')" class="pill rounded-full py-3.5 px-4 text-sm text-gray-300 hover:bg-white/10 active:scale-95 text-center">Напиши план тренировок на неделю</button>
            <button onclick="sendMessage('Переведи текст на английский язык')" class="pill rounded-full py-3.5 px-4 text-sm text-gray-300 hover:bg-white/10 active:scale-95 text-center">Переведи текст на английский язык</button>
        </div>
    </div>

    <div id="chat-container" class="hidden flex-1 flex-col gap-4 overflow-y-auto pb-4 px-1">
        </div>

    <div class="mt-auto pt-3 pb-1 flex-shrink-0 bg-[#0f0f13]">
        <div class="input-box rounded-[28px] p-2 flex items-center gap-2 w-full border border-gray-800 focus-within:border-gray-600 transition-colors">
            <button class="text-gray-400 hover:text-white px-2 transition"><i class="fa-solid fa-plus text-lg"></i></button>
            <input type="text" id="user-input" placeholder="Сообщение..." class="bg-transparent flex-1 outline-none text-white px-2 text-sm placeholder-gray-500 h-10">
            <button id="send-btn" onclick="handleSendClick()" class="bg-[#b185ff] text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-purple-500 transition active:scale-90 flex-shrink-0">
                <i class="fa-solid fa-arrow-up text-md"></i>
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#0f0f13');
        tg.setBackgroundColor('#0f0f13');

        // Используем ТОЛЬКО ваш Google API ключ!
        const GOOGLE_API_KEY = "AIzaSyA4mhBZCfTZzyAPI67ITdR4mco_3-zduHs";
        let chatHistory = [];

        const welcomeScreen = document.getElementById('welcome-screen');
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');

        function handleSendClick() { sendMessage(userInput.value); }

        userInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage(userInput.value);
        });

        function appendMessage(role, text, id = null) {
            const div = document.createElement('div');
            div.className = `p-3 max-w-[85%] text-sm leading-relaxed ${role === 'user' ? 'msg-user' : 'msg-bot'}`;
            if (id) div.id = id;
            div.innerHTML = text.replace(/\n/g, '<br>'); 
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendTypingIndicator() {
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'msg-bot p-4 max-w-[85%] flex gap-1 items-center';
            div.innerHTML = `
                <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return id;
        }

        async function sendMessage(text) {
            if (!text || text.trim() === '') return;

            welcomeScreen.classList.add('hidden');
            chatContainer.classList.remove('hidden');
            chatContainer.classList.add('flex');

            appendMessage('user', text);
            userInput.value = ''; 
            
            // Сохраняем в нашу внутреннюю историю
            chatHistory.push({ role: "user", content: text });

            // Переводим историю в формат, который понимает Google
            const googleContents = chatHistory.map(msg => ({
                role: msg.role === 'user' ? 'user' : 'model',
                parts: [{ text: msg.content }]
            }));

            const typingId = appendTypingIndicator();

            try {
                // Обращаемся напрямую к серверам Google за Gemma 3 27B
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemma-3-27b-it:generateContent?key=${GOOGLE_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: googleContents })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || "Неизвестная ошибка Google API");
                }

                // Достаем текст из сложной структуры ответа Google
                const botReply = data.candidates[0].content.parts[0].text;

                document.getElementById(typingId).remove();
                appendMessage('bot', botReply);
                
                chatHistory.push({ role: "assistant", content: botReply });

            } catch (error) {
                document.getElementById(typingId).remove();
                appendMessage('bot', "❌ Ошибка Google: " + error.message);
                chatHistory.pop(); 
            }
        }
    </script>
</body>
</html>
