<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Ассистент</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body { 
            background-color: #0f0f13; /* Темный фон как на скриншоте */
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }
        .pill { 
            background-color: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .input-box { 
            background-color: #1e1e24; 
        }
        /* Скрываем скроллбар для красоты */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="flex flex-col h-screen px-4 pt-4 pb-2">
    
    <div class="flex justify-between items-center mb-6 pt-2">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-sparkles text-[#b185ff] text-xl"></i>
            <span class="font-semibold text-lg tracking-wide">AI Ассистент</span>
        </div>
        <div class="bg-[#23232a] px-3 py-1.5 rounded-full text-xs flex items-center gap-2 border border-gray-800">
            <div class="w-1.5 h-1.5 rounded-full bg-purple-500"></div>
            <span class="text-gray-300 font-medium">Gemma 3 27B <i class="fa-solid fa-infinity text-[10px] ml-1 text-gray-500"></i></span>
        </div>
        <div class="flex gap-4 text-gray-400 text-lg">
            <i class="fa-solid fa-magnifying-glass hover:text-white transition"></i>
            <i class="fa-solid fa-plus hover:text-white transition"></i>
            <i class="fa-regular fa-sun hover:text-white transition"></i>
        </div>
    </div>

    <div class="flex gap-6 border-b border-gray-800 pb-3 mb-8 text-sm font-medium text-gray-500">
        <div class="text-white border-b-2 border-white pb-3 -mb-[14px] flex items-center gap-2 cursor-pointer">
            <i class="fa-regular fa-message"></i> Чат
        </div>
        <div class="flex items-center gap-2 cursor-pointer hover:text-gray-300 transition">
            <i class="fa-regular fa-image"></i> Imagen 4
        </div>
        <div class="flex items-center gap-2 cursor-pointer hover:text-gray-300 transition">
            <i class="fa-solid fa-microphone"></i> Live
        </div>
    </div>

    <div id="welcome-screen" class="flex-1 flex flex-col items-center justify-center text-center -mt-10 overflow-y-auto">
        <i class="fa-solid fa-sparkles text-5xl mb-6" style="color: #b185ff; filter: drop-shadow(0 0 20px rgba(177, 133, 255, 0.4));"></i>
        <h1 class="text-2xl font-bold mb-3">Привет! Чем помочь?</h1>
        <p class="text-gray-400 text-sm mb-8 leading-relaxed">
            Используется <span class="text-green-400 font-medium">Gemma 3 27B</span> — надёжная<br>модель без лимитов по умолчанию
        </p>
        
        <div class="flex flex-col gap-3 w-full max-w-sm px-2">
            <button class="pill rounded-full py-3.5 px-4 text-sm text-gray-300 hover:bg-white/10 transition active:scale-95 text-center">Объясни квантовые вычисления простыми словами</button>
            <button class="pill rounded-full py-3.5 px-4 text-sm text-gray-300 hover:bg-white/10 transition active:scale-95 text-center">Напиши план тренировок на неделю</button>
            <button class="pill rounded-full py-3.5 px-4 text-sm text-gray-300 hover:bg-white/10 transition active:scale-95 text-center">Переведи текст на английский язык</button>
            <button class="pill rounded-full py-3.5 px-4 text-sm text-gray-300 hover:bg-white/10 transition active:scale-95 text-center">Напиши Python скрипт для сортировки файлов</button>
        </div>
    </div>

    <div class="mt-auto pt-2 pb-1 bg-[#0f0f13]">
        <div class="flex gap-5 mb-3 text-gray-500 text-xs font-semibold px-4 tracking-wide">
            <div class="cursor-pointer hover:text-white transition"><i class="fa-solid fa-code mr-1.5"></i> Код</div>
            <div class="cursor-pointer hover:text-white transition"><i class="fa-solid fa-camera mr-1.5"></i> Камера</div>
        </div>
        
        <div class="input-box rounded-[28px] p-2 flex items-center gap-2 w-full border border-gray-800">
            <input type="text" id="user-input" placeholder="Спросите что-нибудь..." class="bg-transparent flex-1 outline-none text-white px-4 text-sm placeholder-gray-500 h-10">
            <button class="text-gray-400 hover:text-white transition px-2">
                <i class="fa-solid fa-paperclip text-lg"></i>
            </button>
            <button id="send-btn" class="bg-[#b185ff] text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-purple-500 transition active:scale-90 flex-shrink-0">
                <i class="fa-solid fa-paper-plane text-sm translate-x-[-1px] translate-y-[1px]"></i>
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // Сообщаем телеграму, что приложение готово, и разворачиваем его
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#0f0f13');
        tg.setBackgroundColor('#0f0f13');
    </script>
</body>
</html>
